<!-- request-tracking.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Blood Request - Blood Connect Nepal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .search-section {
            padding: 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        .search-form {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-form input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-form button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-form button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .content-section {
            padding: 40px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .request-id {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-fulfilled {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline-item {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 24px;
            top: 50px;
            bottom: -30px;
            width: 2px;
            background: #e0e0e0;
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-dot {
            width: 50px;
            height: 50px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .timeline-dot.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .timeline-dot.completed {
            border-color: #27ae60;
            background: #27ae60;
            color: white;
        }

        .timeline-content {
            flex: 1;
            padding-top: 5px;
        }

        .timeline-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .timeline-date {
            color: #666;
            font-size: 13px;
        }

        .timeline-note {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
        }

        .detail-value {
            color: #333;
            font-size: 14px;
        }

        .details-grid.full {
            grid-template-columns: 1fr;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-data-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #333;
        }

        .btn-secondary:hover {
            background: #bdc3c7;
        }

        .status-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .step {
            text-align: center;
            flex: 1;
            position: relative;
        }

        .step::after {
            content: '';
            position: absolute;
            top: 25px;
            left: 50%;
            right: -50%;
            height: 2px;
            background: #e0e0e0;
        }

        .step:last-child::after {
            display: none;
        }

        .step.active .step-circle,
        .step.completed .step-circle {
            background: #667eea;
            color: white;
        }

        .step.active .step-circle::after {
            content: '';
            position: absolute;
            right: -50px;
            top: 25px;
            width: 50px;
            height: 2px;
            background: #667eea;
        }

        .step.completed .step-circle::after {
            right: -50px;
            background: #27ae60;
        }

        .step-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin: 0 auto 10px;
            font-size: 18px;
            position: relative;
        }

        .step-label {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .search-form {
                flex-direction: column;
            }

            .search-form input {
                min-width: 100%;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .status-steps {
                flex-direction: column;
                gap: 10px;
            }

            .step::after {
                display: none;
            }

            .step-circle::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🩸 Track Blood Request</h1>
            <p>Check the status of your blood request in real-time</p>
        </div>

        <div class="search-section">
            <div class="search-form">
                <input type="text" id="requestIdInput" placeholder="Enter Request ID (e.g., BR_XXXXXXX)" autofocus>
                <input type="tel" id="phoneInput" placeholder="Enter your contact phone number">
                <button onclick="searchRequest()">Search</button>
            </div>
            <p style="color: #666; font-size: 13px;">
                💡 Enter your Request ID and phone number to track your blood request status.
            </p>
        </div>

        <div class="content-section">
            <div id="alertBox" class="alert"></div>

            <div id="loadingBox" class="loading" style="display: none;">
                <div class="spinner"></div>
            </div>

            <div id="noDataBox" class="no-data">
                <div class="no-data-icon">🔍</div>
                <h2>Search for your request</h2>
                <p>Enter your Request ID and phone number to check the status</p>
            </div>

            <div id="resultBox" style="display: none;">
                <!-- Results will be populated here -->
            </div>
        </div>
    </div>

    <script>
        // Allow Enter key to search
        document.getElementById('requestIdInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchRequest();
        });

        document.getElementById('phoneInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchRequest();
        });

        async function searchRequest() {
            const requestId = document.getElementById('requestIdInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();

            if (!requestId || !phone) {
                showAlert('Please enter both Request ID and phone number', 'error');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch('YOUR_GOOGLE_APPS_SCRIPT_URL', {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getRequestStatus',
                        requestId: requestId,
                        phone: phone
                    }),
                    headers: { 'Content-Type': 'application/json' }
                });

                const result = await response.json();

                if (result.success && result.request) {
                    displayRequestStatus(result.request);
                } else {
                    showAlert('Request not found. Please check your Request ID and phone number.', 'error');
                    document.getElementById('noDataBox').style.display = 'block';
                    document.getElementById('resultBox').style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Network error. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        function displayRequestStatus(request) {
            document.getElementById('noDataBox').style.display = 'none';

            const resultBox = document.getElementById('resultBox');

            const statusSteps = [
                { label: 'Submitted', status: 'Submitted' },
                { label: 'Under Review', status: 'Pending' },
                { label: 'Approved', status: 'Approved' },
                { label: 'Fulfilled', status: 'Fulfilled' }
            ];

            const currentStatusIndex = statusSteps.findIndex(s => s.status === request.Status);

            let stepsHTML = '<div class="status-steps">';
            statusSteps.forEach((step, index) => {
                const isCompleted = index < currentStatusIndex;
                const isActive = index === currentStatusIndex;
                const className = isCompleted ? 'completed' : (isActive ? 'active' : '');

                stepsHTML += `
                    <div class="step ${className}">
                        <div class="step-circle">${isCompleted ? '✓' : isActive ? '●' : index + 1}</div>
                        <div class="step-label">${step.label}</div>
                    </div>
                `;
            });
            stepsHTML += '</div>';

            let statusClass = 'status-' + request.Status.toLowerCase();
            let statusText = request.Status;

            if (request.Status === 'Rejected') {
                statusText = '❌ ' + statusText;
            } else if (request.Status === 'Fulfilled') {
                statusText = '✅ ' + statusText;
            } else if (request.Status === 'Approved') {
                statusText = '✓ ' + statusText;
            } else if (request.Status === 'Pending') {
                statusText = '⏳ ' + statusText;
            }

            const createdDate = new Date(request.CreatedAt).toLocaleDateString('en-NP', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            const updatedDate = new Date(request.UpdatedAt).toLocaleDateString('en-NP', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            resultBox.innerHTML = `
                <div class="status-card">
                    <div class="status-header">
                        <div class="request-id">${request.RequestID}</div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>

                    ${stepsHTML}

                    <div class="details-grid">
                        <div class="detail-item">
                            <span class="detail-label">Patient Name</span>
                            <span class="detail-value">${request.PatientName}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Blood Type Required</span>
                            <span class="detail-value">${request.BloodType}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Quantity</span>
                            <span class="detail-value">${request.Quantity} units</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Urgency</span>
                            <span class="detail-value">${request.Urgency}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Hospital</span>
                            <span class="detail-value">${request.HospitalName}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Department</span>
                            <span class="detail-value">${request.Department}</span>
                        </div>
                        <div class="detail-item full">
                            <span class="detail-label">Contact Person</span>
                            <span class="detail-value">${request.ContactName} (${request.ContactRelationship}) - ${request.ContactPhone}</span>
                        </div>
                        <div class="detail-item full">
                            <span class="detail-label">Request Submitted</span>
                            <span class="detail-value">${createdDate}</span>
                        </div>
                        <div class="detail-item full">
                            <span class="detail-label">Last Updated</span>
                            <span class="detail-value">${updatedDate}</span>
                        </div>
                    </div>

                    ${request.Status === 'Rejected' ? `
                        <div class="alert alert-error show" style="margin-top: 20px;">
                            <strong>Rejection Reason:</strong> ${request.RejectionReason || 'Not specified'}
                        </div>
                    ` : ''}

                    ${request.Status === 'Approved' ? `
                        <div class="alert alert-success show" style="margin-top: 20px;">
                            <strong>Good news!</strong> Your blood request has been approved. Expected delivery will be communicated via SMS/Email.
                        </div>
                    ` : ''}

                    <div class="action-buttons">
                        <button class="btn btn-secondary" onclick="printRequest()">🖨️ Print</button>
                        <button class="btn btn-primary" onclick="location.href='index.html'">Back Home</button>
                    </div>
                </div>
            `;

            document.getElementById('resultBox').style.display = 'block';
            showAlert('Request found! Here is your status.', 'success');
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('loadingBox').style.display = show ? 'flex' : 'none';
        }

        function printRequest() {
            window.print();
        }
    </script>
</body>
</html>
